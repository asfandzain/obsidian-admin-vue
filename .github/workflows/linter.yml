name: Frontend Quality Gate

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Quality checks
        run: pnpm check

      - name: Unit tests
        run: pnpm test:unit

  e2e:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup frontend toolchain
        uses: ./.github/actions/setup-frontend

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e
